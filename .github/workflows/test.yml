name: Test Suite

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  QT_QPA_PLATFORM: offscreen
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxcb-shape0 \
            libxkbcommon-x11-0 libegl1 libgl1 \
            xvfb

      - name: Install project dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ -m unit \
            --tb=short -q \
            --cov=src --cov-report=xml:coverage-unit.xml

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  component-tests:
    name: Component Tests (Qt)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxcb-shape0 \
            libxkbcommon-x11-0 libegl1 libgl1 \
            xvfb

      - name: Install project dependencies
        run: uv sync --dev

      - name: Run component tests
        run: |
          xvfb-run -a uv run pytest tests/component/ -m component \
            --tb=short -q \
            --cov=src --cov-report=xml:coverage-component.xml

      - name: Upload component coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-component
          path: coverage-component.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxcb-shape0 \
            libxkbcommon-x11-0 libegl1 libgl1 \
            xvfb

      - name: Install project dependencies
        run: uv sync --dev

      - name: Run integration tests
        run: |
          xvfb-run -a uv run pytest tests/integration/ -m integration \
            --tb=short -q \
            --cov=src --cov-report=xml:coverage-integration.xml

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml

  bdd-tests:
    name: BDD Acceptance Tests
    runs-on: ubuntu-latest
    needs: [component-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxcb-shape0 \
            libxkbcommon-x11-0 libegl1 libgl1 \
            xvfb

      - name: Install project dependencies
        run: uv sync --dev

      - name: Run BDD tests
        run: |
          xvfb-run -a uv run pytest tests/bdd/ -m bdd \
            --tb=short -q

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install coverage tool
        run: uv pip install --system coverage

      - name: Combine and report coverage
        run: |
          uv run python -m coverage combine coverage-*.xml || true
          uv run python -m coverage report --fail-under=40
