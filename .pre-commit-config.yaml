repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--config, pyproject.toml]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.3
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--config-file, pyproject.toml]
        additional_dependencies: [types-PyYAML, types-tqdm]
        pass_filenames: false
        entry: mypy src/
        exclude: ^(src/device_scripts/|src/icons_rc\.py|src/ui_main_window\.py)

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/unit/ -m unit -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
